<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillMap System</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon"></div>
        <h1>SkillMap System</h1>
      </div>
      <div class="profile-badge" id="profileBadge">
        <span class="pulse"></span>
        <span id="userName">Loading...</span>
      </div>
    </header>

    <main id="setupView" class="hidden">
      <section class="action-section text-center">
        <h2>Link Account</h2>
        <p class="subtitle" style="margin-bottom: 15px;">Enter your Secret Pairing Key from your Dashboard</p>
        <input type="text" id="secretKeyInput" placeholder="Paste key here..." style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #333; background: rgba(0,0,0,0.2); color: white;" />
        <button id="saveKeyBtn" class="primary-btn">Link Extension</button>
      </section>
    </main>

    <main id="mainView" class="hidden">
      <section class="action-section">
        <p class="subtitle">Found a job or form?</p>
        <button id="magicFillBtn" class="primary-btn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          Magic Auto-Fill
        </button>
        <div id="fillStatus" class="status-msg hidden"></div>
      </section>

      <div class="divider"></div>

      <section class="analysis-section">
        
        <button id="findBestMatchBtn" class="primary-btn" style="background: linear-gradient(135deg, #8b5cf6, #ec4899); border: none; font-weight: 600; margin-bottom: 15px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline; margin-right:5px; vertical-align:text-bottom;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          Auto-Find Best Job on Page
        </button>
        
        <div id="bestMatchResult" class="hidden" style="background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 8px; padding: 12px; margin-bottom: 15px;">
          <p id="bestMatchReason" style="font-size: 12px; color: #e2e8f0; margin-bottom: 8px; line-height: 1.4;"></p>
          <button id="openBestMatchBtn" class="primary-btn" style="padding: 6px; font-size: 13px; min-height: 30px;">Open Application</button>
        </div>

        <div class="header-row">
          <h2>System Page Analysis</h2>
          <button id="analyzeBtn" class="icon-btn" title="Re-analyze page">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-10.37l5.67-5.67"/></svg>
          </button>
        </div>

        <div id="loadingAnalysis" class="loading-state">
          <div class="spinner"></div>
          <p>Analyzing page content...</p>
        </div>

        <div id="analysisResult" class="hidden">
          <div class="score-card">
            <div class="score-circle" id="scoreCircle">
              <span id="matchScore">--</span><span class="percent">%</span>
            </div>
            <div class="score-details">
              <h3>Role Match</h3>
              <p id="targetRole" class="target-role">Detecting...</p>
            </div>
          </div>
          
          <div class="recommendations">
            <h4>Skill Gaps Found:</h4>
            <ul id="missingSkillsList">
              <!-- Populated by JS -->
            </ul>
          </div>
        </div>
      </section>
    </main>
    <div style="text-align: center; margin-top: 10px; font-size: 10px;">
      <a href="#" id="unlinkBtn" style="color: #666; text-decoration: none;">Unlink Account</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
